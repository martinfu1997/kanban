<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Denied — AI Assistant Tasks</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: #161b22;
    border: 1px solid #3d1f22;
    border-radius: 16px;
    padding: 48px 40px;
    width: 400px;
    max-width: calc(100vw - 32px);
    text-align: center;
  }

  .icon {
    font-size: 3rem;
    margin-bottom: 16px;
  }

  h1 {
    font-size: 1.25rem;
    font-weight: 600;
    color: #f85149;
    margin-bottom: 12px;
  }

  .message {
    font-size: 0.875rem;
    color: #8b949e;
    line-height: 1.6;
    margin-bottom: 32px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: #21262d;
    color: #e6edf3;
    border: 1px solid #30363d;
    border-radius: 8px;
    font-size: 0.875rem;
    font-weight: 500;
    text-decoration: none;
    transition: border-color 0.15s, background 0.15s;
  }

  .back-btn:hover {
    background: #30363d;
    border-color: #58a6ff;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🚫</div>
  <h1>Access Denied</h1>
  <p class="message">
    This Kanban board is restricted to an authorized account.<br>
    The Google account you signed in with is not permitted.
  </p>
  <a href="/login" class="back-btn">← Back to Login</a>
</div>
</body>
</html>
