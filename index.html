<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant Tasks</title>
<style>
  #lock-screen {
    position: fixed; inset: 0; background: #0d1117;
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  #lock-screen.hidden { display: none; }
  .lock-box {
    background: #161b22; border: 1px solid #30363d;
    border-radius: 14px; padding: 36px 32px; width: 320px; text-align: center;
  }
  .lock-box h2 { color: #f0f6fc; margin-bottom: 8px; font-size: 1.1rem; }
  .lock-box p { color: #8b949e; font-size: 0.82rem; margin-bottom: 20px; }
  .lock-box input {
    width: 100%; background: #0d1117; border: 1px solid #30363d;
    border-radius: 8px; color: #e6edf3; padding: 10px 12px;
    font-size: 0.9rem; outline: none; margin-bottom: 12px;
  }
  .lock-box input:focus { border-color: #58a6ff; }
  .lock-box button {
    width: 100%; background: #238636; color: #fff; border: none;
    padding: 10px; border-radius: 8px; font-size: 0.9rem;
    font-weight: 500; cursor: pointer;
  }
  .lock-box button:hover { background: #2ea043; }
  .lock-error { color: #f85149; font-size: 0.8rem; margin-top: 8px; display: none; }
</style>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    padding: 24px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  header h1 {
    font-size: 1.4rem;
    font-weight: 600;
    color: #f0f6fc;
    letter-spacing: -0.01em;
  }

  header h1 span { color: #58a6ff; }

  .add-btn {
    background: #238636;
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
  }
  .add-btn:hover { background: #2ea043; }

  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    align-items: start;
  }

  .column {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 16px;
    min-height: 200px;
  }

  .column-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .column-title {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #8b949e;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .column-title .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }

  #col-todo .dot     { background: #8b949e; }
  #col-progress .dot { background: #f0883e; }
  #col-done .dot     { background: #3fb950; }
  #col-ideas .dot    { background: #a371f7; }

  .count {
    background: #21262d;
    color: #8b949e;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 12px;
    min-width: 20px;
    text-align: center;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 60px;
  }

  .cards.drag-over {
    background: rgba(88, 166, 255, 0.05);
    border-radius: 8px;
    outline: 2px dashed #30363d;
  }

  .card {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 14px;
    cursor: grab;
    user-select: none;
    transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
    position: relative;
  }

  .card:hover {
    border-color: #58a6ff;
    box-shadow: 0 0 0 1px rgba(88,166,255,0.2);
  }

  .card.dragging {
    opacity: 0.4;
    cursor: grabbing;
    transform: scale(0.98);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 6px;
  }

  .card-icon {
    font-size: 1.2rem;
    line-height: 1;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .card-title {
    font-size: 0.9rem;
    font-weight: 600;
    color: #f0f6fc;
    line-height: 1.3;
    flex: 1;
  }

  .card-desc {
    font-size: 0.78rem;
    color: #8b949e;
    line-height: 1.5;
    margin-left: calc(1.2rem + 10px);
    margin-bottom: 6px;
  }

  .card-label {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: calc(1.2rem + 10px);
    margin-top: 2px;
  }

  /* Label colors per project */
  .label-extended    { background: #1f3b5e; color: #58a6ff; }
  .label-onepost     { background: #1f3b2e; color: #3fb950; }
  .label-voicetyper  { background: #3b2e1f; color: #f0883e; }
  .label-website     { background: #2e1f3b; color: #a371f7; }
  .label-underdogjustice{ background: #3b1f1f; color: #f85149; }
  .label-softmiles   { background: #1f3b3b; color: #39d0d8; }
  .label-crashlab    { background: #3b3b1f; color: #e3b341; }
  .label-general     { background: #21262d; color: #8b949e; }

  .card-actions {
    position: absolute;
    top: 10px;
    right: 10px;
    display: none;
    gap: 4px;
  }

  .card:hover .card-actions { display: flex; }

  .card-btn {
    background: #30363d;
    border: none;
    color: #8b949e;
    border-radius: 5px;
    width: 22px; height: 22px;
    font-size: 0.7rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, color 0.1s;
  }

  .card-btn:hover { background: #3d444d; color: #f0f6fc; }
  .card-btn.del:hover { background: #3d1f22; color: #f85149; }

  /* Modal */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }

  .modal {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 14px;
    padding: 28px;
    width: 420px;
    max-width: calc(100vw - 32px);
  }

  .modal h2 {
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 20px;
    color: #f0f6fc;
  }

  .form-group { margin-bottom: 14px; }

  .form-group label {
    display: block;
    font-size: 0.78rem;
    color: #8b949e;
    margin-bottom: 6px;
    font-weight: 500;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #e6edf3;
    padding: 9px 12px;
    font-size: 0.875rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus { border-color: #58a6ff; }

  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-group select option { background: #161b22; }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  .btn-cancel {
    background: transparent;
    border: 1px solid #30363d;
    color: #8b949e;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 0.875rem;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .btn-cancel:hover { border-color: #58a6ff; color: #e6edf3; }

  .btn-save {
    background: #238636;
    color: #fff;
    border: none;
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-save:hover { background: #2ea043; }

  @media (max-width: 900px) {
    .board { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 500px) {
    .board { grid-template-columns: 1fr; }
  }

  /* Video Prompts Section */
  .section-title {
    font-size: 1rem;
    font-weight: 600;
    color: #f0f6fc;
    margin: 36px 0 16px 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title span { color: #8b949e; font-size: 0.8rem; font-weight: 400; }

  .prompts-board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    align-items: start;
  }

  .prompt-column {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 16px;
  }

  .prompt-column-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .prompt-column-title {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .brand-underdogjustice { color: #f85149; }
  .brand-softmiles       { color: #39d0d8; }
  .brand-crashlab        { color: #e3b341; }

  .prompt-card {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    font-size: 0.82rem;
    color: #e6edf3;
    line-height: 1.5;
    position: relative;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: border-color 0.15s;
  }

  .prompt-card:hover { border-color: #58a6ff; }

  .prompt-text { flex: 1; }

  .prompt-copy-btn {
    background: #30363d;
    border: none;
    color: #8b949e;
    border-radius: 5px;
    width: 26px; height: 26px;
    font-size: 0.75rem;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, color 0.1s;
  }
  .prompt-copy-btn:hover { background: #3d444d; color: #f0f6fc; }

  .prompt-del-btn {
    background: #30363d;
    border: none;
    color: #8b949e;
    border-radius: 5px;
    width: 26px; height: 26px;
    font-size: 0.75rem;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, color 0.1s;
  }
  .prompt-del-btn:hover { background: #3d1f22; color: #f85149; }

  .prompt-add-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed #30363d;
    color: #8b949e;
    border-radius: 8px;
    padding: 8px;
    font-size: 0.8rem;
    cursor: pointer;
    margin-top: 4px;
    transition: border-color 0.15s, color 0.15s;
  }
  .prompt-add-btn:hover { border-color: #58a6ff; color: #58a6ff; }

  @media (max-width: 900px) {
    .prompts-board { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-box">
    <h2>🔒 AI Assistant Tasks</h2>
    <p>Enter password to continue</p>
    <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')unlock()" />
    <button onclick="unlock()">Unlock</button>
    <div class="lock-error" id="pw-error">Incorrect password</div>
  </div>
</div>

<header>
  <h1>🤖 <span>AI Assistant</span> Tasks</h1>
  <button class="add-btn" onclick="openModal()">＋ Add Card</button>
</header>

<div class="board">
  <div class="column" id="col-todo">
    <div class="column-header">
      <span class="column-title"><span class="dot"></span>Todo</span>
      <span class="count" id="count-todo">0</span>
    </div>
    <div class="cards" id="cards-todo"></div>
  </div>

  <div class="column" id="col-progress">
    <div class="column-header">
      <span class="column-title"><span class="dot"></span>In Progress</span>
      <span class="count" id="count-progress">0</span>
    </div>
    <div class="cards" id="cards-progress"></div>
  </div>

  <div class="column" id="col-done">
    <div class="column-header">
      <span class="column-title"><span class="dot"></span>Done</span>
      <span class="count" id="count-done">0</span>
    </div>
    <div class="cards" id="cards-done"></div>
  </div>

  <div class="column" id="col-ideas">
    <div class="column-header">
      <span class="column-title"><span class="dot"></span>Ideas</span>
      <span class="count" id="count-ideas">0</span>
    </div>
    <div class="cards" id="cards-ideas"></div>
  </div>
</div>

<!-- Video Prompts Section -->
<div class="section-title">🎬 AI Video Prompts <span>Click 📋 to copy · ✕ to delete</span></div>
<div class="prompts-board">
  <div class="prompt-column">
    <div class="prompt-column-header">
      <span class="prompt-column-title brand-underdogjustice">⚖️ Underdog Justice</span>
    </div>
    <div id="prompts-underdogjustice"></div>
    <button class="prompt-add-btn" onclick="addPrompt('underdogjustice')">＋ Add Prompt</button>
  </div>
  <div class="prompt-column">
    <div class="prompt-column-header">
      <span class="prompt-column-title brand-crashlab">🏎️ Crash Lab</span>
    </div>
    <div id="prompts-crashlab"></div>
    <button class="prompt-add-btn" onclick="addPrompt('crashlab')">＋ Add Prompt</button>
  </div>
  <div class="prompt-column">
    <div class="prompt-column-header">
      <span class="prompt-column-title brand-softmiles">🌿 Soft Miles</span>
    </div>
    <div id="prompts-softmiles"></div>
    <button class="prompt-add-btn" onclick="addPrompt('softmiles')">＋ Add Prompt</button>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-bg" id="modal-bg" onclick="handleBgClick(event)">
  <div class="modal">
    <h2 id="modal-title">Add Card</h2>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="f-title" placeholder="Task title..." />
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="f-desc" placeholder="Optional description..."></textarea>
    </div>
    <div class="form-group">
      <label>Icon / Emoji</label>
      <input type="text" id="f-icon" placeholder="e.g. 🎙️ or leave blank" maxlength="4" />
    </div>
    <div class="form-group">
      <label>Project</label>
      <select id="f-project">
        <option value="">— None —</option>
        <option value="extended">Extended</option>
        <option value="onepost">One Post</option>
        <option value="voicetyper">Voice Typer</option>
        <option value="website">Personal Website</option>
        <option value="underdogjustice">Underdog Justice</option>
        <option value="softmiles">Soft Miles</option>
        <option value="crashlab">Crash Lab</option>
        <option value="general">General</option>
      </select>
    </div>
    <div class="form-group">
      <label>Column</label>
      <select id="f-col">
        <option value="todo">Todo</option>
        <option value="progress">In Progress</option>
        <option value="done">Done</option>
        <option value="ideas">Ideas</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveCard()">Save</button>
    </div>
  </div>
</div>

<script>
  const PROJECT_LABELS = {
    extended:     { label: 'Extended',           cls: 'label-extended' },
    onepost:      { label: 'One Post',            cls: 'label-onepost' },
    voicetyper:   { label: 'Voice Typer',         cls: 'label-voicetyper' },
    website:      { label: 'Personal Website',    cls: 'label-website' },
    underdogjustice: { label: 'Underdog Justice',  cls: 'label-underdogjustice' },
    softmiles:    { label: 'Soft Miles',          cls: 'label-softmiles' },
    crashlab:     { label: 'Crash Lab',           cls: 'label-crashlab' },
    general:      { label: 'General',             cls: 'label-general' },
  };

  const INITIAL_DATA = [
    { id: 1, title: "Set up voice transcription", desc: "Integrate microphone input with Whisper or system STT API", icon: "🎙️", col: "done", project: "" },
    { id: 2, title: "Take desktop screenshot", desc: "Capture full screen or selection on demand", icon: "📸", col: "done", project: "" },
    { id: 3, title: "Calendar event parser", desc: "Read and summarize upcoming events from calendar", icon: "📅", col: "todo", project: "" },
    { id: 4, title: "Web search integration", desc: "Connect to search API for real-time lookup", icon: "🔍", col: "progress", project: "" },
    { id: 5, title: "File system watcher", desc: "Monitor directories for new or changed files", icon: "📁", col: "progress", project: "" },
    { id: 6, title: "Clipboard monitor", desc: "Watch clipboard and act on copied content", icon: "📋", col: "done", project: "" },
    { id: 7, title: "Shell command executor", desc: "Run terminal commands and capture output", icon: "⚙️", col: "done", project: "" },
    { id: 8, title: "Install ffmpeg (arm64)", desc: "", icon: "🎞️", col: "done", project: "" },
    { id: 9, title: "Gmail integration", desc: "Read and send emails via Gmail API", icon: "📧", col: "done", project: "" },
    { id: 10, title: "GitHub integration", desc: "Push/pull repos, create repos via gh CLI", icon: "🐙", col: "done", project: "" },
    { id: 11, title: "Kanban board", desc: "Public board with password protection and Ideas column", icon: "📋", col: "done", project: "" },
    { id: 12, title: "Note-taking skill", desc: "Voice/text ideas saved and shown on board", icon: "💡", col: "done", project: "" },
    { id: 13, title: "Audio Fix Studio", desc: "Web app: upload audio, fix mistakes via voice clone (ElevenLabs), download corrected audio. Public app.", icon: "🎙️", col: "ideas", project: "general" },
  ];

  let cards = JSON.parse(localStorage.getItem('kanban-cards') || 'null') || INITIAL_DATA;
  // nextId computed belowcards.map(c => c.id), 0) + 1;
  let editId = null;
  let dragId = null;

  function save() {
    localStorage.setItem('kanban-cards', JSON.stringify(cards));
  }

  function render() {
    ['todo', 'progress', 'done', 'ideas'].forEach(col => {
      const container = document.getElementById('cards-' + col);
      const colCards = cards.filter(c => c.col === col);
      container.innerHTML = colCards.map(card => {
        const proj = card.project && PROJECT_LABELS[card.project];
        return `
        <div class="card" id="card-${card.id}"
          draggable="true"
          ondragstart="onDragStart(event, ${card.id})"
          ondragend="onDragEnd(event)">
          <div class="card-actions">
            <button class="card-btn" onclick="editCard(${card.id})" title="Edit">✎</button>
            <button class="card-btn del" onclick="deleteCard(${card.id})" title="Delete">✕</button>
          </div>
          <div class="card-top">
            ${card.icon ? `<span class="card-icon">${card.icon}</span>` : ''}
            <span class="card-title">${esc(card.title)}</span>
          </div>
          ${card.desc ? `<p class="card-desc">${esc(card.desc)}</p>` : ''}
          ${proj ? `<span class="card-label ${proj.cls}">${proj.label}</span>` : ''}
        </div>`;
      }).join('');
      document.getElementById('count-' + col).textContent = colCards.length;

      container.ondragover = e => { e.preventDefault(); container.classList.add('drag-over'); };
      container.ondragleave = e => { if (!container.contains(e.relatedTarget)) container.classList.remove('drag-over'); };
      container.ondrop = e => { e.preventDefault(); container.classList.remove('drag-over'); dropCard(col); };
    });
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function onDragStart(e, id) {
    dragId = id;
    setTimeout(() => document.getElementById('card-' + id)?.classList.add('dragging'), 0);
  }

  function onDragEnd(e) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('dragging'));
    document.querySelectorAll('.cards').forEach(c => c.classList.remove('drag-over'));
  }

  function dropCard(col) {
    if (dragId == null) return;
    const card = cards.find(c => c.id === dragId);
    if (card) { card.col = col; save(); render(); }
    dragId = null;
  }

  function openModal(id = null) {
    editId = id;
    const card = id ? cards.find(c => c.id === id) : null;
    document.getElementById('modal-title').textContent = id ? 'Edit Card' : 'Add Card';
    document.getElementById('f-title').value = card?.title || '';
    document.getElementById('f-desc').value = card?.desc || '';
    document.getElementById('f-icon').value = card?.icon || '';
    document.getElementById('f-project').value = card?.project || '';
    document.getElementById('f-col').value = card?.col || 'todo';
    document.getElementById('modal-bg').classList.add('open');
    setTimeout(() => document.getElementById('f-title').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modal-bg').classList.remove('open');
    editId = null;
  }

  function handleBgClick(e) {
    if (e.target === document.getElementById('modal-bg')) closeModal();
  }

  function saveCard() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { document.getElementById('f-title').focus(); return; }
    const col     = document.getElementById('f-col').value;
    const desc    = document.getElementById('f-desc').value.trim();
    const icon    = document.getElementById('f-icon').value.trim();
    const project = document.getElementById('f-project').value;

    if (editId) {
      const card = cards.find(c => c.id === editId);
      if (card) Object.assign(card, { title, desc, icon, col, project });
    } else {
      cards.push({ id: nextId++, title, desc, icon, col, project });
    }
    save(); render(); closeModal();
  }

  function editCard(id) { openModal(id); }

  function deleteCard(id) {
    cards = cards.filter(c => c.id !== id);
    save(); render();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && e.ctrlKey && document.getElementById('modal-bg').classList.contains('open')) saveCard();
  });

  // Password lock
  const CORRECT = btoa('fu3432672');
  function unlock() {
    const val = document.getElementById('pw-input').value;
    if (btoa(val) === CORRECT) {
      sessionStorage.setItem('kanban-auth', '1');
      document.getElementById('lock-screen').classList.add('hidden');
    } else {
      document.getElementById('pw-error').style.display = 'block';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }
  if (sessionStorage.getItem('kanban-auth') !== '1') {
    setTimeout(() => document.getElementById('pw-input').focus(), 100);
  } else {
    document.getElementById('lock-screen').classList.add('hidden');
  }

  render();

  // ── Video Prompts ──────────────────────────────────────────────
  const INITIAL_PROMPTS = {
    underdogjustice: [
      "A lone figure in a dark courtroom, spotlight cutting through shadows, determined eyes staring at the camera. Cinematic drama, slow zoom in, intense orchestral build. Caption: 'Fighting for the truth.'",
      "Time-lapse of a city waking up at dawn — streets empty then filling with people. Voiceover: 'Every person deserves a fair chance.' Documentary style, warm golden tones.",
      "Split screen: one side shows a powerful executive in a glass office tower; the other shows an ordinary person at a kitchen table reading paperwork. Tense, high-contrast lighting. Text overlay: 'The fight isn't over.'",
      "Slow-motion footage of a gavel striking a podium, ripples spreading outward. Epic cinematic score. End card with logo and tagline: 'Justice for the underdogs.'",
      "Hands — diverse, worn, young, old — reaching toward each other across a divide. Warm backlighting, emotional ambient music. Caption: 'Together, we stand.'"
    ],
    crashlab: [
      "POV shot from inside a racing car hurtling through a neon-lit tunnel, sparks flying, engine roaring. Ultra fast cuts. Text: 'Push the limit.' Adrenaline electronic music.",
      "Extreme slow-motion crash test: a car impacts a barrier and crumples, glass exploding in crystalline patterns. Scientific data overlaid. Moody industrial soundtrack.",
      "Drone aerial shot of a empty track at golden hour, a single car doing donuts, tire smoke rising. Wide angle, cinematic lens flare. No text — pure visuals.",
      "Side-by-side: engineers working on specs vs. driver gripping the wheel mid-race. Fast intercutting, high tension. Caption: 'Built in the lab. Proven on the track.'",
      "A car launches off a ramp in slow motion against a twilight sky, rotates 360°, lands perfectly. Epic orchestral hit on landing. Brand logo reveals on impact."
    ],
    softmiles: [
      "Aerial view of a winding road through a misty forest at sunrise. A lone traveler walking slowly, backpack on. Gentle acoustic guitar. Caption: 'Go at your own pace.'",
      "Close-up of feet stepping on different surfaces: sand, cobblestone, grass, wood floor. Soft ambient sound design. Text: 'Every step tells a story.'",
      "Time-lapse of clouds drifting over a mountain trail. A hammock sways gently. Minimal lo-fi music. End card: 'Soft Miles — for the quiet adventurers.'",
      "A traveler sitting at a café window, rain outside, warm light inside, writing in a journal. Cozy cinematic feel, bokeh lights. No dialogue, only ambient sound.",
      "Hands unfolding a worn paper map on a wooden table, coffee cup nearby, morning light. Slow zoom out to reveal a cozy travel-worn room. Caption: 'The journey is the destination.'"
    ]
  };

  let prompts = JSON.parse(localStorage.getItem('kanban-prompts') || 'null') || INITIAL_PROMPTS;

  function savePrompts() {
    localStorage.setItem('kanban-prompts', JSON.stringify(prompts));
  }

  function renderPrompts() {
    ['underdogjustice', 'crashlab', 'softmiles'].forEach(brand => {
      const container = document.getElementById('prompts-' + brand);
      const list = prompts[brand] || [];
      container.innerHTML = list.map((p, i) => `
        <div class="prompt-card">
          <span class="prompt-text">${esc(p)}</span>
          <button class="prompt-copy-btn" onclick="copyPrompt(${i}, '${brand}')" title="Copy">📋</button>
          <button class="prompt-del-btn" onclick="deletePrompt(${i}, '${brand}')" title="Delete">✕</button>
        </div>
      `).join('');
    });
  }

  function copyPrompt(i, brand) {
    const text = prompts[brand][i];
    navigator.clipboard.writeText(text).then(() => {
      // brief visual feedback
      const btns = document.querySelectorAll(`#prompts-${brand} .prompt-copy-btn`);
      if (btns[i]) { btns[i].textContent = '✓'; setTimeout(() => { btns[i].textContent = '📋'; }, 1200); }
    });
  }

  function deletePrompt(i, brand) {
    prompts[brand].splice(i, 1);
    savePrompts();
    renderPrompts();
  }

  function addPrompt(brand) {
    const text = prompt('Enter new video prompt:');
    if (text && text.trim()) {
      prompts[brand] = prompts[brand] || [];
      prompts[brand].push(text.trim());
      savePrompts();
      renderPrompts();
    }
  }

  renderPrompts();
</script>
</body>
</html>
